<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MCP DB Tools Config Admin</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/components.css" />
  </head>
  <body>
    <!-- 顶栏：标题 + configPath + 全局操作，整个 SPA 生命周期常驻，不随视图切换刷新 -->
    <header class="topbar">
      <div class="topbar__head">
        <div>
          <p id="eyebrow" class="eyebrow">Local Admin</p>
          <h1 id="viewTitle">MCP DB Tools Config Admin</h1>
          <p id="configPath" class="muted">正在加载配置路径...</p>
        </div>
        <div class="toolbar" aria-label="全局操作">
          <button id="reloadBtn" type="button" class="button secondary">
            重新加载
          </button>
          <button id="saveBtn" type="button" class="button primary">
            保存配置
          </button>
        </div>
      </div>
      <nav id="nav" class="nav" aria-label="功能导航"></nav>
    </header>

    <!-- 视图容器：shell 根据当前路由注入/卸载各视图内容 -->
    <main id="view" class="view-root"></main>

    <!-- 共享浮层：toast 与确认弹窗，由 shell 统一管理 -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="confirmDialog" class="dialog">
      <form method="dialog">
        <h2 id="confirmTitle">确认操作</h2>
        <p id="confirmMessage"></p>
        <div class="dialog-actions">
          <button value="cancel" type="submit" class="button secondary">
            取消
          </button>
          <button
            id="confirmOkBtn"
            value="ok"
            type="submit"
            class="button danger"
          >
            确认
          </button>
        </div>
      </form>
    </dialog>

    <script src="./scripts/admin-api.js"></script>
    <script src="./scripts/ui.js"></script>
    <script src="./scripts/nav.js"></script>
    <script src="./scripts/keywords.js"></script>
    <script src="./scripts/projects.js"></script>
    <script src="./scripts/shell.js"></script>
  </body>
</html>
